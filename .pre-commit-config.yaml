repos:
  # --------------------------------------------------------------------------
  # General hygiene
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # --------------------------------------------------------------------------
  # Ruff — linting + formatting (replaces isort, pyupgrade, flake8, black)
  # --------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # --------------------------------------------------------------------------
  # Mypy — static type checking
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: ["--strict"]
        additional_dependencies:
          - fastapi>=0.110.0
          - pydantic>=2.6.0
          # joblib has no stubs; ignore_missing_imports is set in pyproject.toml [tool.mypy.overrides]
